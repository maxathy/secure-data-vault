name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly on Mondays at 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Audit for high/critical vulnerabilities
        run: yarn npm audit --all --recursive --severity high

  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The INSECURE-DEV-ONLY keyset files are intentionally committed
          # and clearly labeled. They are NOT real secrets.
          GITLEAKS_CONFIG: |
            [allowlist]
              paths = [
                "packages/crypto-core/keysets/INSECURE-DEV-ONLY\\.keyset\\.json",
                "packages/crypto-core/keysets/INSECURE-DEV-ONLY\\.mac\\.keyset\\.json"
              ]

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build vault-api Docker image
        run: docker build -t vault-api:scan -f apps/vault-api/Dockerfile .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vault-api:scan
          format: table
          exit-code: 1
          severity: CRITICAL
